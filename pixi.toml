[workspace]
authors = ["Sam Pfeiffer <sammypfeiffer@gmail.com>"]
name = "rclcppyy_ws"
channels = ["robostack-jazzy", "conda-forge"]
platforms = ["linux-64"]
version = "0.2.0"

[dependencies]
ros-jazzy-ros-base = ">=0.11"
ros-jazzy-rmw-cyclonedds-cpp = "*"
cppyy = ">=3.5,<4"
colcon-common-extensions = "*"
cmake = "*"
ninja = "*"
make = "*"
compilers = "*"
pkg-config = "*"
python = "3.12.*"
# robostack-jazzy's launch_testing / launch_ros pytest plugins use hook
# signatures removed in pytest 8, so keep pytest on the 7.x line.
pytest = ">=7.4,<8"
numpy = "*"
setuptools = "<81"
psutil = ">=7.2.2,<8"
# M3: rclcppyy's rclcpp core + cppyy kits were carved into the cppyy_kit suite
# (rclcpp_kit / cppyy_kit). rclcppyy re-exports them via deprecation shims, so both
# must be IMPORTABLE at runtime. Until the suite is published to prefix.dev, they
# are NOT conda deps here — a file:// channel in the lock would not resolve on CI /
# other machines. Instead they are put on PYTHONPATH from a sibling cppyy_kit
# checkout by workspace_activation.sh (the "PYTHONPATH bridge"; set CPPYY_KIT_SRC to
# override the default ../cppyy_kit). The SHIPPED conda package DOES carry them as
# run-deps (recipe/recipe.yaml); that path swaps to the awesomebytes channel after
# the suite publishes. See RELEASING.md.

[activation]
scripts = ["workspace_activation.sh"]

[activation.env]
# fastrtps (the ROS default) has intermittent latency issues and drops big
# messages; cyclonedds on LOCALHOST is the reliable default for this workspace.
RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp"
ROS_AUTOMATIC_DISCOVERY_RANGE = "LOCALHOST"
# cppyy resolves C++ symbols at call time by scanning LD_LIBRARY_PATH for the
# owning shared library (e.g. librclcpp.so). conda/robostack rely on RPATH and
# leave LD_LIBRARY_PATH unset, so without this cppyy.gbl.rclcpp calls fail with
# "failed to resolve function". Point it at the env's lib dir.
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"

[tasks]
build = "colcon build --packages-select rclcppyy"
clean = "rm -rf build install log"
test = "pytest test/"
lint = "flake8 rclcppyy test"
# rclpy-vs-rclcppyy CPU comparison in one command (default: 1 kHz + 10 kHz).
# Extra flags pass straight through, e.g. `pixi run bench --rate 5000 --duration 10`.
bench = "python scripts/benchmarks/run_benchmarks.py"
# The rclpy publisher/subscriber tutorial, running on the rclcppyy C++ backend.
demo-tutorial = "python scripts/ros_tutorials/publisher_member_function.py"
# One-command live pub/sub demo (rclcppyy monkeypatched backend).
demo-pubsub = "python scripts/benchmarks/run_benchmarks.py --demo"

# --- tf: drive the tf2 C++ transform stack from Python (rclcppyy/tf.py). tf2 is core
# ROS 2 (default env), so these live in the default [tasks]. See docs/tf/REPORT.md. ---
# Minimal lookup example: C++ listener ingests /tf, Python looks the transform up.
demo-tf-lookup = "python scripts/tf_demos/d01_lookup_example.py"
# Synthetic TF-storm publisher (frames*rate transforms/s on /tf); runs until killed.
demo-tf-storm = "python scripts/tf_demos/tf_storm_publisher.py --frames 50 --rate 100"
# THE ANSWER TO SAM: stock rclpy Python listener vs rclcppyy C++ listener --
# ingest CPU% under a TF storm + lookup latency/throughput, in one table.
bench-tf = "python scripts/tf_demos/bench_tf.py"

# Optional "demos" feature/environment: heavy extras used only by the example
# scripts under scripts/big_messages_demos/ and roscon_uk_2025/. Kept out of the
# default env so a plain `pixi install` stays lean. Enable with `pixi install -e
# demos` and run the tasks with `pixi run -e demos <task>`.
[feature.demos.dependencies]
opencv = "*"                    # cv2 for the image demo
ros-jazzy-pcl-conversions = "*" # pcl <-> sensor_msgs/PointCloud2 bridge (headers)
pcl = "*"                       # Point Cloud Library headers (voxelgrid demo)
eigen = "*"                     # PCL/pcl_conversions dependency (eigen3 headers)
gstreamer = "*"                 # gstreamer demo pipeline
gst-plugins-base = "*"          # videoconvert / appsrc / appsink elements
gst-plugins-good = "*"          # v4l2src / autovideosink elements
pygobject = "*"                 # the `gi` bindings (gi.repository.Gst)
typer = "*"                     # CLI wrapper used by the gstreamer / cloudini demos
hypothesis = "*"                # property-based testing demo

[feature.demos.tasks]
# Publishes a real JPEG as a sensor_msgs/Image at 4 Hz via the rclcppyy C++
# backend (loads the image relative to the script, prints its size on startup).
demo-images = "python scripts/big_messages_demos/demo_images.py"
# Property-based testing of a JIT-compiled C++ function with Hypothesis. Runs
# to completion on its own.
demo-hypothesis = "python roscon_uk_2025/presentation/5_hypothesis_test.py"
# PCL VoxelGrid downsampling node. JIT-compiles the pcl/pcl_conversions kernel
# on startup (the interesting part), then waits for PointCloud2 messages on
# /lexus3/os_center/points — needs an external bag to produce output.
demo-pointcloud-voxelgrid = "python roscon_uk_2025/presentation/2_pointcloud_voxelgrid.py"

# Optional "pkg" feature/environment: tooling to build the conda package from
# recipe/. Standalone (no default ROS/cppyy stack), so it stays lean and doesn't
# perturb the default env's lock.
[feature.pkg.dependencies]
rattler-build = ">=0.68,<0.69"

[feature.pkg.tasks]
# Build the ros-jazzy-rclcppyy conda package from recipe/ into ./output.
# Channels match the workspace. The recipe's import-smoke test env resolves the
# 0.2.0 run-deps (ros-jazzy-rclcpp-kit, cppyy-kit) from the suite channel.
# NOTE (pre-release): that channel is the LOCAL rattler-build output until the suite
# publishes; after publish, swap the file:// entry for
# "https://repo.prefix.dev/awesomebytes" (see RELEASING.md, step 2).
# Run with `pixi run -e pkg pkg-build`.
pkg-build = "rattler-build build --recipe recipe/recipe.yaml -c robostack-jazzy -c conda-forge -c file:///home/sapf/playground/ros_project/cppyy_kit/output --output-dir output"

# Optional "bt" feature/environment: BehaviorTree.CPP v4 for the bt_kit cppyy
# spike (rclcppyy/kits/bt_kit.py). Kept out of the default env so a plain
# `pixi install` stays lean and BT stays an opt-in dependency. Enable with
# `pixi install -e bt` and run tasks with `pixi run -e bt <task>`.
[feature.bt.dependencies]
ros-jazzy-behaviortree-cpp = ">=4.9,<5" # BehaviorTree.CPP v4 (headers + libbehaviortree_cpp.so)

[feature.bt.tasks]
# Official BT.CPP tutorial 1 (first tree) written in short Python via bt_kit.
demo-bt-t01 = "python scripts/bt_kit_demos/t01_first_tree.py"
# Official BT.CPP ports tutorial written in short Python via bt_kit.
demo-bt-t02 = "python scripts/bt_kit_demos/t02_ports.py"
# Mixed-language tree: a Python leaf, a JIT'd C++ leaf, and a leaf that drives
# existing C++ (publishes a ROS 2 message via rclcpp) from inside the tick.
demo-bt-t03 = "python scripts/bt_kit_demos/t03_mixed_tree.py"
# ticks/sec micro-benchmark: C++ JIT leaves vs Python leaves through the kit.
bench-bt = "python scripts/bt_kit_demos/bench_bt.py"
# (M3) The bt_kit / cppyy_kit / freeze test suites moved to the cppyy_kit repo
# (run `pixi run -e bt test-bt` there). rclcppyy only smoke-tests its kit shims,
# in the default env: `pixi run test` (test/test_kit_shims.py).

# --- L0->L1 "freeze": build a Cling PCH of the bt headers so bringup skips the
# ~0.83 s header JIT-parse (see docs/kits/FREEZE.md). ---
# (Re)build the frozen PCH artifact into the gitignored build/freeze/ dir. Rerun
# after a cppyy-cling or behaviortree_cpp version change (the filename tags it).
freeze-bt-build = "python scripts/freeze/build_bt_pch.py"
# Run any command with the frozen PCH active, e.g.
# `pixi run -e bt freeze-bt-run scripts/bt_kit_demos/t01_first_tree.py`.
freeze-bt-run = "python scripts/freeze/run_frozen.py"
# L0 (JIT) vs L1 (frozen) bringup numbers: staged wall time, time-to-first-tick,
# total t01 runtime; median over cold subprocess samples.
freeze-bench = "python scripts/freeze/bench_freeze.py"
# (M3) The frozen-path test suite moved to the cppyy_kit repo with the kits.
# t01 first tree on the frozen path (fast bringup).
demo-bt-t01-frozen = "python scripts/freeze/run_frozen.py scripts/bt_kit_demos/t01_first_tree.py"

# --- L2 lowering: t01's ApproachObject Python leaf, emitted as a native C++
# BehaviorTree.CPP plugin node (registered JIT-free via registerFromPlugin). ---
# Compile the native node into build/freeze/libl2_approach_object.so.
freeze-l2-build = "python scripts/freeze/build_l2_node.py"
# Differential test: same XML/node ID, Python leaf (L0) vs native plugin (L2) --
# assert identical output/status, then compare per-tick boundary cost.
freeze-l2-diff = "python scripts/freeze/l2_diff.py"

# Optional "pcl" feature/environment: Point Cloud Library for the pcl_kit cppyy
# spike (rclcppyy/kits/pcl_kit.py). Same opt-in pattern as the bt feature.
# Enable with `pixi install -e pcl` and run tasks with `pixi run -e pcl <task>`.
[feature.pcl.dependencies]
pcl = "*"                       # Point Cloud Library (headers + libpcl_*.so)
ros-jazzy-pcl-conversions = "*" # pcl <-> sensor_msgs/PointCloud2 bridge
eigen = "*"                     # PCL dependency (eigen3 headers)

[feature.pcl.tasks]
# Minimal NumPy path: NumPy cloud -> PCL VoxelGrid -> NumPy, printed sizes.
demo-pcl-voxel = "python scripts/pcl_kit_demos/d01_voxel_numpy.py"
# THE SHOWCASE: a self-contained ROS 2 pipeline (synthetic 100k-pt publisher +
# subscribe/VoxelGrid/republish) where the cloud stays in C++ end to end.
demo-pcl-pipeline = "python scripts/pcl_kit_demos/d02_ros_pipeline.py"
# Compare the pcl_kit pipeline (d02) vs the plain rclpy+NumPy baseline (d03):
# per-frame latency, CPU%, derived max throughput, and user LOC in one table.
bench-pcl = "python scripts/pcl_kit_demos/bench_pcl_pipeline.py"

# Optional "ompl" feature/environment: the Open Motion Planning Library for the
# ompl_kit cppyy spike. Same opt-in pattern as bt/pcl.
[feature.ompl.dependencies]
ros-jazzy-ompl = "*" # OMPL headers + libompl.so (brings its mutex-pinned boost)
eigen = "*"          # OMPL dependency (eigen3 headers)

[feature.ompl.tasks]
# OMPL's first geometric-planning tutorial (2D plan around a circular obstacle,
# Python validity checker) written in short Python via ompl_kit.
demo-ompl-plan = "python scripts/ompl_kit_demos/d01_first_plan.py"
# Plan a 2D path, then publish it as a nav_msgs/Path on a ROS 2 topic (rclcppyy).
demo-ompl-path = "python scripts/ompl_kit_demos/d02_publish_path.py"
# The honest hot-loop bench: same plan, three validity-checker variants
# (Python via callback / Python subclass / native JIT'd C++). solve time +
# ns-per-call + calls/sec each.
bench-ompl = "python scripts/ompl_kit_demos/bench_ompl_validity.py"
# (M3) The ompl_kit test suite moved to the cppyy_kit repo (`pixi run -e ompl test-ompl`).

# Optional "nav2" feature/environment: Nav2 algorithm cores for the nav2_kit
# cppyy spike (compose a nav stack from Python). Same opt-in pattern as bt/pcl/ompl.
[feature.nav2.dependencies]
ros-jazzy-nav2-costmap-2d = "*"                        # Costmap2D core classes
ros-jazzy-nav2-navfn-planner = "*"                     # NavFn planner core
ros-jazzy-nav2-smac-planner = "*"                      # Smac/Hybrid-A* planners
ros-jazzy-nav2-regulated-pure-pursuit-controller = "*" # RPP controller
ros-jazzy-nav2-msgs = "*"                              # nav2 message types

[feature.nav2.tasks]
# Plan on a synthetic occupancy grid with Nav2's real Costmap2D + NavFn cores,
# driven from Python (no lifecycle server / pluginlib / tf). Prints the path.
demo-nav2-plan = "python scripts/nav2_kit_demos/d01_plan_grid.py"
# THE SHOWCASE: a complete miniature nav stack in one file -- synthetic world ->
# Costmap2D -> NavFn plan -> pure-pursuit follow loop (simulated diff-drive) ->
# publishes OccupancyGrid + Path + TwistStamped via rclcppyy (rviz2-visualizable).
demo-nav2-stack = "python scripts/nav2_kit_demos/d02_own_nav_stack.py"
# NavFn-from-Python vs a pure-Python A* on 256/512/1024 grids: plan-time table
# (the "C++ math, Python orchestration" performance story).
bench-nav2-plan = "python scripts/nav2_kit_demos/bench_nav2_plan.py"
# (M3) The nav2_kit test suite moved to the cppyy_kit repo (`pixi run -e nav2 test-nav2`).

# Optional "moveit" feature/environment: MoveIt 2 for the moveit_kit cppyy spike
# (full moveit_cpp API from Python; moveit_py included as the contrast subset).
[feature.moveit.dependencies]
ros-jazzy-moveit = "*"                                 # MoveIt 2 metapackage
ros-jazzy-moveit-resources-panda-moveit-config = "*"   # Panda test model (URDF/SRDF/configs)
ros-jazzy-moveit-py = "*"                              # official Python subset (contrast)

[feature.moveit.tasks]
# RobotModel + FK + KDL IK basics from Python (parse layer + pluginlib kinematics).
demo-moveit-state = "python scripts/moveit_kit_demos/d01_robot_state.py"
# THE SHOWCASE: plan the Panda to a Cartesian pose goal with MoveIt's real OMPL
# pipeline (loaded in-process via pluginlib), publish a moveit_msgs/DisplayTrajectory
# on /display_planned_path (rviz-compatible), print the joint-trajectory summary.
demo-moveit-plan = "python scripts/moveit_kit_demos/d02_plan_pose_goal.py"
# Bench: collision checks/sec + IK solves/sec, moveit_kit (full C++ via cppyy) vs
# moveit_py (the pybind subset). Each library in a fresh subprocess.
bench-moveit = "python scripts/moveit_kit_demos/bench_moveit.py"
# (M3) The moveit_kit test suite moved to the cppyy_kit repo (`pixi run -e moveit test-moveit`).

# Optional "control" feature/environment: ros2_control for the control_kit spike
# (Python controller inside the real controller_manager via a pluginlib bridge).
[feature.control.dependencies]
ros-jazzy-ros2-control = "*"      # controller_manager, hardware/controller interfaces
ros-jazzy-ros2-controllers = "*"  # standard C++ controllers (baselines) + mock usage

[feature.control.tasks]
# Stages 1-2: a real controller_manager in-process with mock hardware, and a stock C++
# controller (forward_command_controller) loaded/configured/activated + command flow.
demo-control-rig = "python scripts/control_kit_demos/d01_mock_rig.py"
# THE SHOWCASE (Stage 3): a PD controller written in Python, cross-inherited from the
# real controller_interface::ControllerInterface, injected into the in-process CM and
# driven by the real read/update/write loop -- no plugin xml, no CMake, no .so.
demo-control-python = "python scripts/control_kit_demos/d02_python_controller.py"
# Stage 4: update-loop rate/jitter/missed-deadline numbers, Python controller vs the
# stock C++ baseline under the same rig, at 100 Hz and 1 kHz.
bench-control = "python scripts/control_kit_demos/bench_control_loop.py"
# (M3) The control_kit test suite moved to the cppyy_kit repo (`pixi run -e control test-control`).

# Optional "vision" feature/environment: the visual loop-closure tutorial
# (cv_kit + dbow_kit + gtsam_kit). OpenCV pinned to 4.x for DBoW2 source
# compatibility (DBoW2 is built from source into build/vendor/ — not packaged
# on conda-forge). NOTE: conda-forge ships no CUDA OpenCV builds, so the CPU
# cv::ORB path is primary; cv::cuda is auto-detected if the user provides a
# CUDA build (e.g. JetPack).
[feature.vision.dependencies]
opencv = "4.*"          # C++ OpenCV (core/features2d headers + libs) + cv2 for contrast
rerun-sdk = "*"         # live multimodal visualization
gtsam = "*"             # pose-graph optimization (stretch milestone)
libboost-headers = "*"  # headers-only (no ABI/mutex conflict): lets gtsam headers JIT via cppyy

[feature.vision.tasks]
# Fetch, patch and compile DBoW2 (Bags of Binary Words) from source into the
# gitignored build/vendor/ (not packaged on conda-forge). Run once before the
# loop-closure demos/tests.
build-dbow2 = "python scripts/vision/build_dbow2.py"
# (M3) The vision kit + loop-closure test suites moved to the cppyy_kit repo
# (`pixi run -e vision test-vision`).
# Reusable data source: publish the deterministic synthetic loop sequence as
# sensor_msgs/Image (zero download). Pass --tum DIR / --folder DIR for other data.
dataset-synthetic = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/datasets/dataset_publisher.py --synthetic"
# Download + verify the real TUM RGB-D loop-closure sequence into data/ (gitignored).
dataset-tum = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/datasets/download_tum_rgbd.py"
# Download the real ORB vocabulary (ORBvoc.txt, ~145 MB) for the real-data path.
dataset-orbvoc = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/datasets/download_orbvoc.py"
# Train a small DBoW2 vocabulary on a sequence (default: synthetic -> a .dbow2).
vocab-train = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/train_vocab.py"
# M1 SPINE: rclcppyy subscription (C++ msg) -> cv_kit.msg_to_mat (zero-copy) -> Rerun
# Image + Pinhole. Headless by default (.rrd); RCLCPPYY_RERUN_SPAWN=1 for live viewer.
demo-vision-spine = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/demo_spine.py"
# M2 FEATURES: C++ cv::ORB per frame, keypoints overlaid as a Rerun Points2D.
demo-vision-features = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/demo_features.py"
# M3 LOOP CLOSURE (the heart): ORB -> DBoW2 place recognition -> temporal gate.
# Default vocab is trained on the sequence (zero download); --vocab data/ORBvoc.txt
# for the real vocabulary, --tum DIR for the real sequence.
demo-vision-loop = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/demo_loop.py"
# M4 STRETCH: GTSAM pose-graph correction of a drifting trajectory using the
# confirmed loop closures; before/after trajectories logged to Rerun.
demo-vision-posegraph = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/demo_posegraph.py"
# M5 EVAL: ingest (zero-copy vs rclpy-copy, scaling with resolution), ORB fps,
# vocab train/load time, query latency, loop precision/recall. --orbvoc adds the
# real-vocabulary load timing (needs dataset-orbvoc).
bench-vision = "PYTHONPATH=$PIXI_PROJECT_ROOT $CONDA_PREFIX/bin/python scripts/vision/bench_vision.py"

# Optional "cudabuild" feature/environment: provisions & validates a CUDA-enabled
# OpenCV (cv::cuda::ORB / cudafeatures2d) for the vision tutorial's GPU path.
#
# Job-1 verdict (docs/vision/CUDA_OPENCV.md): conda-forge ships NO CUDA OpenCV --
# its opencv-feedstock build.sh sets -DWITH_CUDA=0 -DWITH_CUBLAS=0, there is no
# cuda variant key, and 0 of 6357 conda-forge libopencv builds carry a cuda tag
# (verified via the anaconda.org API). BUT a trustworthy prebuilt DOES exist: the
# public, Apache-2.0 Esri channel's libopencv 4.13.0 'cuda129_py313_4' (linux-64)
# -- the SAME OpenCV version as feature.vision's opencv 4.13.0, built against CUDA
# 12.9 (Blackwell-capable) and validated end-to-end on an RTX PRO 2000 (sm_120).
#
# We do NOT install that package directly (its gstreamer/ffmpeg/hdf5 deps don't
# co-solve with current conda-forge, and cv::cuda::ORB needs none of them):
# scripts/vision/build_opencv_cuda.py extracts its C++ .so's + headers into
# build/vendor/opencv-cuda/ (gitignored). This env supplies ONLY the CUDA 12.9
# runtime those libs link against, plus a compiler for the validation smoke test.
#   pixi run -e cudabuild provision-cuda-opencv   # download+verify(sha256)+extract
#   pixi run -e cudabuild validate-cuda-opencv    # C++ cv::cuda::ORB + CPU-vs-CUDA bench
[feature.cudabuild.dependencies]
python = "3.12.*"
cuda-version = "12.9.*"    # match the prebuilt's CUDA (driver 580 supports up to 13.0)
cuda-cudart = ">=12.9,<13"
libcublas = ">=12.9,<13"   # libcublas.so.12
libcufft = "*"             # libcufft.so.11
libnpp = "*"               # libnppial/icc/idei/if/ig/im/ist/itc.so.12 -- ORB uses several
libzlib = "*"
gxx = "*"                  # C++ compiler for the validation smoke test
zstandard = "*"            # extract the .conda payload (pkg-*.tar.zst)

[feature.cudabuild.tasks]
# Download the pinned Esri prebuilt, verify its sha256, extract libs+headers into
# build/vendor/opencv-cuda/ (gitignored).
provision-cuda-opencv = "python scripts/vision/build_opencv_cuda.py provision"
# Compile + run the end-to-end cv::cuda::ORB smoke test and CPU-vs-CUDA fps bench.
validate-cuda-opencv = "python scripts/vision/build_opencv_cuda.py validate"

[environments]
# solve-group = "default" pins every shared package to the exact same version as
# the default env, so enabling demos never re-resolves the core ROS/cppyy stack.
demos = { features = ["demos"], solve-group = "default" }
# Wave-2 kit spike envs, same additive pattern as bt/pcl/ompl.
nav2 = { features = ["nav2"], solve-group = "default" }
moveit = { features = ["moveit"], solve-group = "default" }
control = { features = ["control"], solve-group = "default" }
# Visual loop-closure tutorial env.
vision = { features = ["vision"], solve-group = "default" }
# GPU vision: provisions/validates the CUDA OpenCV. Standalone (no-default-feature)
# -- it only vendors the cuda libs + supplies the CUDA 12.9 runtime & a compiler.
cudabuild = { features = ["cudabuild"], no-default-feature = true }
# Integrated GPU vision env: the vision tutorial stack + the CUDA 12.9 runtime in
# one process, so cv_kit auto-detects cv::cuda once build/vendor/opencv-cuda/lib is
# first on the library path. See docs/vision/CUDA_OPENCV.md for the exact ordering.
vision-cuda = { features = ["vision", "cudabuild"], solve-group = "default" }
# PCL spike env, same additive pattern as bt.
pcl = { features = ["pcl"], solve-group = "default" }
# OMPL spike env, same additive pattern as bt/pcl.
ompl = { features = ["ompl"], solve-group = "default" }
# no-default-feature: the packaging tooling doesn't need the ROS/cppyy stack.
pkg = { features = ["pkg"], no-default-feature = true }
# BehaviorTree.CPP spike env. solve-group "default" keeps the shared ROS/cppyy
# stack pinned identically to the default env (behaviortree-cpp is purely
# additive on top).
bt = { features = ["bt"], solve-group = "default" }
