[workspace]
authors = ["Sam Pfeiffer <sammypfeiffer@gmail.com>"]
name = "rclcppyy_ws"
channels = ["https://repo.prefix.dev/awesomebytes", "robostack-jazzy", "conda-forge"]
platforms = ["linux-64"]
version = "0.2.0"

[dependencies]
ros-jazzy-ros-base = ">=0.11"
ros-jazzy-rmw-cyclonedds-cpp = "*"
cppyy = ">=3.5,<4"
colcon-common-extensions = "*"
cmake = "*"
ninja = "*"
make = "*"
compilers = "*"
pkg-config = "*"
python = "3.12.*"
# robostack-jazzy's launch_testing / launch_ros pytest plugins use hook
# signatures removed in pytest 8, so keep pytest on the 7.x line.
pytest = ">=7.4,<8"
numpy = "*"
setuptools = "<81"
psutil = ">=7.2.2,<8"
# M3: rclcppyy's rclcpp core + cppyy kits were carved into the cppyy_kit suite
# (rclcpp_kit / cppyy_kit). rclcppyy re-exports them via deprecation shims, so both
# must be IMPORTABLE at runtime. The suite is now published to prefix.dev
# (awesomebytes channel, added above), so these are real conda deps pinned to the
# published version -- matching recipe/recipe.yaml's run-deps. See RELEASING.md.
ros-jazzy-rclcpp-kit = "==0.1.0"
cppyy-kit = "==0.1.0"

[activation]
scripts = ["workspace_activation.sh"]

[activation.env]
# fastrtps (the ROS default) has intermittent latency issues and drops big
# messages; cyclonedds on LOCALHOST is the reliable default for this workspace.
RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp"
ROS_AUTOMATIC_DISCOVERY_RANGE = "LOCALHOST"
# cppyy resolves C++ symbols at call time by scanning LD_LIBRARY_PATH for the
# owning shared library (e.g. librclcpp.so). conda/robostack rely on RPATH and
# leave LD_LIBRARY_PATH unset, so without this cppyy.gbl.rclcpp calls fail with
# "failed to resolve function". Point it at the env's lib dir.
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"

[tasks]
build = "colcon build --packages-select rclcppyy"
clean = "rm -rf build install log"
test = "pytest test/"
lint = "flake8 rclcppyy test"
# rclpy-vs-rclcppyy CPU comparison in one command (default: 1 kHz + 10 kHz).
# Extra flags pass straight through, e.g. `pixi run bench --rate 5000 --duration 10`.
bench = "python scripts/benchmarks/run_benchmarks.py"
# The rclpy publisher/subscriber tutorial, running on the rclcppyy C++ backend.
demo-tutorial = "python scripts/ros_tutorials/publisher_member_function.py"
# One-command live pub/sub demo (rclcppyy monkeypatched backend).
demo-pubsub = "python scripts/benchmarks/run_benchmarks.py --demo"

# Optional "demos" feature/environment: heavy extras used only by the example
# scripts under scripts/big_messages_demos/ and roscon_uk_2025/. Kept out of the
# default env so a plain `pixi install` stays lean. Enable with `pixi install -e
# demos` and run the tasks with `pixi run -e demos <task>`.
[feature.demos.dependencies]
opencv = "*"                    # cv2 for the image demo
ros-jazzy-pcl-conversions = "*" # pcl <-> sensor_msgs/PointCloud2 bridge (headers)
pcl = "*"                       # Point Cloud Library headers (voxelgrid demo)
eigen = "*"                     # PCL/pcl_conversions dependency (eigen3 headers)
gstreamer = "*"                 # gstreamer demo pipeline
gst-plugins-base = "*"          # videoconvert / appsrc / appsink elements
gst-plugins-good = "*"          # v4l2src / autovideosink elements
pygobject = "*"                 # the `gi` bindings (gi.repository.Gst)
typer = "*"                     # CLI wrapper used by the gstreamer / cloudini demos
hypothesis = "*"                # property-based testing demo

[feature.demos.tasks]
# Publishes a real JPEG as a sensor_msgs/Image at 4 Hz via the rclcppyy C++
# backend (loads the image relative to the script, prints its size on startup).
demo-images = "python scripts/big_messages_demos/demo_images.py"
# Property-based testing of a JIT-compiled C++ function with Hypothesis. Runs
# to completion on its own.
demo-hypothesis = "python roscon_uk_2025/presentation/5_hypothesis_test.py"
# PCL VoxelGrid downsampling node. JIT-compiles the pcl/pcl_conversions kernel
# on startup (the interesting part), then waits for PointCloud2 messages on
# /lexus3/os_center/points — needs an external bag to produce output.
demo-pointcloud-voxelgrid = "python roscon_uk_2025/presentation/2_pointcloud_voxelgrid.py"

# Optional "pkg" feature/environment: tooling to build the conda package from
# recipe/. Standalone (no default ROS/cppyy stack), so it stays lean and doesn't
# perturb the default env's lock.
[feature.pkg.dependencies]
rattler-build = ">=0.68,<0.69"

[feature.pkg.tasks]
# Build the ros-jazzy-rclcppyy conda package from recipe/ into ./output.
# Channels match the workspace. The recipe's import-smoke test env resolves the
# 0.2.0 run-deps (ros-jazzy-rclcpp-kit, cppyy-kit) from the suite channel, now the
# published `awesomebytes` channel on prefix.dev (see RELEASING.md, step 2).
# Run with `pixi run -e pkg pkg-build`.
pkg-build = "rattler-build build --recipe recipe/recipe.yaml -c https://repo.prefix.dev/awesomebytes -c robostack-jazzy -c conda-forge --output-dir output"

[environments]
# solve-group = "default" pins the shared ROS/cppyy stack to the default env's
# versions, so enabling `demos` never re-resolves it. The kit spike envs
# (bt/pcl/ompl/nav2/moveit/control/vision/cudabuild) moved to the cppyy_kit repo
# with the kits themselves (M3 cleanup); only the product's own demos + packaging
# envs remain here.
demos = { features = ["demos"], solve-group = "default" }
# no-default-feature: the packaging tooling doesn't need the ROS/cppyy stack.
pkg = { features = ["pkg"], no-default-feature = true }
